# Example configuration for school POI / education-facility construction.
# Copy this file to config.yaml and edit local paths before running scripts.

project:
  output_root: "<set-local-path>"

school_poi:
  raw_poi_root: "<set-local-path>"
  processed_root: "<set-local-path>"

  province_workflow:
    province_notebook_root: "<set-local-path>"
    representative_provinces:
      - "Anhui"
      - "Beijing"
      - "Fujian"

  auxiliary_data:
    euluc_root: "<set-local-path>"
    clcd_root: "<set-local-path>"
    nighttime_light_root: "<set-local-path>"
    population_density_root: "<set-local-path>"
    landuse_root: "<set-local-path>"

outputs:
  province_cleaned_root: "<set-local-path>"
  national_school_poi: "<set-local-path>"
  school_point_auxiliary_attributes: "<set-local-path>"
  inferred_establishment_year: "<set-local-path>"

notes:
  - "Raw POI records, geospatial rasters, and school-level processed outputs are not included in this repository."
  - "The archived scripts preserve the existing Jupyter workflow for auditability."
