# Example configuration for 2015 census sample construction.
# Copy to config.yaml and edit local paths before running the scripts.

project:
  output_root: "<set-local-path>"

census2015:
  raw_root: "<set-local-path>"
  processed_root: "<set-local-path>"

  raw_files:
    stata_file: "<set-local-path>"
    fixed_width_or_dat_file: "<set-local-path>"

  outputs:
    microdata_base: "<set-local-path>"
    county_birthyear_scaffold: "<set-local-path>"
    diagnostics: "<set-local-path>"

sample_definition:
  final_birth_year_min: 1980
  final_birth_year_max: 2000
  final_age_min_2015: 15
  final_age_max_2015: 35

notes:
  restricted_data: >
    Raw 2015 population census microdata are restricted and are not included
    in the GitHub repository.
