# Example configuration for external flood dataset comparison.
# Copy this file to config.yaml and edit local paths before running scripts.

inputs:
  city_gumbel_event_table: "<set-local-path>"
  county_gumbel_event_table: "<set-local-path>"
  dfo_event_catalogue: "<set-local-path>"
  gfd_or_external_flood_masks: "<set-local-path>"
  chinese_news_inventory_summary: "<set-local-path>"
  child_education_panel: "<set-local-path>"
  elderly_health_panel: "<set-local-path>"

outputs:
  dfo_event_comparison_results: "<set-local-path>"
  gfd_validation_results: "<set-local-path>"
  chinese_news_inventory_figures: "<set-local-path>"
  dfo_alternative_exposure_results: "<set-local-path>"

notes:
  - "DFO/GFD raw data, Chinese news inventory records, flood masks, rasters, and local comparison outputs are not included."
  - "Restricted microdata and exposure-linked panels should remain local."
