# Example configuration for elderly-health mechanism analysis.
# Copy this file to config.yaml and edit local paths before running scripts.

inputs:
  elderly_health_exposure_panel: "<set-local-path>"
  medical_expenditure_panel: "<set-local-path>"
  healthcare_access_panel: "<set-local-path>"

outputs:
  mechanism_results_root: "<set-local-path>"
  tables_root: "<set-local-path>"
  figures_root: "<set-local-path>"

mechanisms:
  - "medical expenditure"
  - "healthcare access"
  - "channel indices"

notes:
  - "Raw CHARLS microdata are not included in this repository."
  - "Individual-level panels and local result outputs should remain local."
