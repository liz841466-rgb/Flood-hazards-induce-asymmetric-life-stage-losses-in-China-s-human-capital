# Example configuration for elderly-health mechanism analysis.
# Copy this file to config.yaml and edit local paths before running scripts.

inputs:
  elderly_health_exposure_panel: "/path/to/local_outputs/charls_health_panel_60plus_with_exposure.parquet"
  medical_expenditure_panel: "/path/to/local_outputs/charls_medical_expenditure_panel.parquet"
  healthcare_access_panel: "/path/to/local_outputs/charls_healthcare_access_panel.parquet"

outputs:
  mechanism_results_root: "/path/to/local_outputs/elderly_health_mechanism_results"
  tables_root: "/path/to/local_outputs/elderly_health_mechanism_tables"
  figures_root: "/path/to/local_outputs/elderly_health_mechanism_figures"

mechanisms:
  - "medical expenditure"
  - "healthcare access"
  - "channel indices"

notes:
  - "Raw CHARLS microdata are not included in this repository."
  - "Individual-level panels and local result outputs should remain local."
