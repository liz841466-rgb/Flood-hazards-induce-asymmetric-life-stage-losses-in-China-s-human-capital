# Example configuration for 2015 Census education fixed-effects regression workflow.
# Copy this file to config.yaml and edit local paths before running scripts.

inputs:
  census2015_exposure_linked_panel: "<set-local-path>"
  risk_zone_table: "<set-local-path>"

outputs:
  regression_results_root: "<set-local-path>"
  tables_root: "<set-local-path>"
  figures_root: "<set-local-path>"

analysis:
  return_periods: [2, 5, 10, 20, 50, 100]
  baseline_return_period: 10
  childhood_age_min: 0
  childhood_age_max: 15

fixed_effects:
  county_fe: true
  birth_year_fe: true
  province_birthyear_fe: true
  cluster_level: "county"

notes:
  - "Raw 2015 Census microdata are restricted and are not included in this repository."
  - "Individual-level panels and local regression outputs should remain local."
